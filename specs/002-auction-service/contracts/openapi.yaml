openapi: 3.0.3
info:
  title: Auction Service API
  description: 商品拍賣服務 API，負責商品的建立、查詢、管理與使用者追蹤功能
  version: 1.0.0
  contact:
    name: AuctionService Team

servers:
  - url: https://api.example.com/auction-service
    description: Production server
  - url: http://localhost:5002
    description: Local development server

tags:
  - name: Auctions
    description: 商品拍賣相關操作
  - name: Categories
    description: 商品分類查詢
  - name: Follows
    description: 商品追蹤功能
  - name: Health
    description: 健康檢查端點

paths:
  /api/auctions:
    get:
      tags:
        - Auctions
      summary: 查詢商品清單
      description: 取得拍賣商品清單，支援分頁、分類篩選、關鍵字搜尋與排序
      operationId: getAuctions
      parameters:
        - name: pageIndex
          in: query
          description: 頁碼（從 0 開始）
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: pageSize
          in: query
          description: 每頁筆數
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: categoryId
          in: query
          description: 商品分類 ID
          schema:
            type: integer
            format: int64
        - name: keyword
          in: query
          description: 搜尋關鍵字（搜尋商品名稱與描述）
          schema:
            type: string
        - name: sortBy
          in: query
          description: 排序欄位
          schema:
            type: string
            enum: [endTime, startingPrice]
            default: endTime
        - name: sortOrder
          in: query
          description: 排序方向
          schema:
            type: string
            enum: [asc, desc]
            default: asc
        - name: status
          in: query
          description: 商品狀態篩選
          schema:
            type: string
            enum: [pending, active, ended]
      responses:
        '200':
          description: 成功取得商品清單
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/AuctionListItem'
                      totalCount:
                        type: integer
                        description: 總筆數
                      pageIndex:
                        type: integer
                      pageSize:
                        type: integer
                      hasNextPage:
                        type: boolean
                  metadata:
                    $ref: '#/components/schemas/ResponseMetadata'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Auctions
      summary: 建立新商品
      description: 建立新的拍賣商品（需要登入）
      operationId: createAuction
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAuctionRequest'
      responses:
        '201':
          description: 成功建立商品
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AuctionDetail'
                  metadata:
                    $ref: '#/components/schemas/ResponseMetadata'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auctions/{id}:
    get:
      tags:
        - Auctions
      summary: 查詢商品詳細資訊
      description: 取得單一商品的完整資訊（不包含目前競標價格）
      operationId: getAuctionDetail
      parameters:
        - name: id
          in: path
          required: true
          description: 商品 ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 成功取得商品詳細資訊
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AuctionDetail'
                  metadata:
                    $ref: '#/components/schemas/ResponseMetadata'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags:
        - Auctions
      summary: 更新商品資訊
      description: 更新商品資訊（需要登入，僅商品創建者可操作，商品不可有出價記錄）
      operationId: updateAuction
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: 商品 ID
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAuctionRequest'
      responses:
        '200':
          description: 成功更新商品
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AuctionDetail'
                  metadata:
                    $ref: '#/components/schemas/ResponseMetadata'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags:
        - Auctions
      summary: 刪除商品
      description: 刪除商品（需要登入，僅商品創建者可操作，商品不可有出價記錄）
      operationId: deleteAuction
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: 商品 ID
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: 成功刪除商品
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auctions/{id}/current-bid:
    get:
      tags:
        - Auctions
      summary: 查詢商品目前競標價格
      description: 取得商品的最高出價資訊（輕量化查詢，適合高頻輪詢）。當 Bidding Service 不可用時，返回快取資料並標註 dataSource
      operationId: getCurrentBid
      parameters:
        - name: id
          in: path
          required: true
          description: 商品 ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 成功取得目前競標價格
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/CurrentBid'
                  metadata:
                    $ref: '#/components/schemas/ResponseMetadata'
              examples:
                liveData:
                  summary: 即時資料（Bidding Service 正常）
                  value:
                    data:
                      auctionId: 123456789
                      currentBid:
                        amount: 1500.00
                        bidderId: 987654321
                        bidTime: "2025-11-20T10:30:00Z"
                        dataSource: "live"
                    metadata:
                      statusCode: "SUCCESS"
                      statusName: "Success"
                      message: "操作成功"
                cachedData:
                  summary: 快取資料（Bidding Service 不可用）
                  value:
                    data:
                      auctionId: 123456789
                      currentBid:
                        amount: 1500.00
                        bidderId: 987654321
                        bidTime: "2025-11-20T10:25:00Z"
                        dataSource: "cache"
                    metadata:
                      statusCode: "BIDDING_SERVICE_UNAVAILABLE"
                      statusName: "Bidding Service Unavailable"
                      message: "出價服務暫時無法連線，顯示的出價資訊可能過時"
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auctions/{id}/images:
    post:
      tags:
        - Auctions
      summary: 上傳商品圖片
      description: 上傳商品圖片至雲端儲存（需要登入，僅商品創建者可操作，最多 5 張圖片）
      operationId: uploadAuctionImages
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: 商品 ID
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                images:
                  type: array
                  items:
                    type: string
                    format: binary
                  maxItems: 5
                  description: 圖片檔案（JPG/PNG/WebP，每張最大 5MB）
      responses:
        '200':
          description: 成功上傳圖片
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      imageUrls:
                        type: array
                        items:
                          type: string
                        description: 已上傳的圖片 URL
                  metadata:
                    $ref: '#/components/schemas/ResponseMetadata'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auctions/users/{userId}:
    get:
      tags:
        - Auctions
      summary: 查詢特定使用者的所有商品
      description: 取得指定使用者建立的所有商品
      operationId: getAuctionsByUser
      parameters:
        - name: userId
          in: path
          required: true
          description: 使用者 ID
          schema:
            type: integer
            format: int64
        - name: pageIndex
          in: query
          schema:
            type: integer
            default: 0
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 成功取得使用者商品清單
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/AuctionListItem'
                      totalCount:
                        type: integer
                      pageIndex:
                        type: integer
                      pageSize:
                        type: integer
                  metadata:
                    $ref: '#/components/schemas/ResponseMetadata'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/categories:
    get:
      tags:
        - Categories
      summary: 查詢所有商品分類
      description: 取得系統預設的商品分類清單
      operationId: getCategories
      responses:
        '200':
          description: 成功取得分類清單
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Category'
                  metadata:
                    $ref: '#/components/schemas/ResponseMetadata'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/follows:
    get:
      tags:
        - Follows
      summary: 查詢使用者的追蹤清單
      description: 取得當前使用者追蹤的所有商品（需要登入）
      operationId: getMyFollows
      security:
        - bearerAuth: []
      parameters:
        - name: pageIndex
          in: query
          schema:
            type: integer
            default: 0
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 成功取得追蹤清單
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/FollowItem'
                      totalCount:
                        type: integer
                      pageIndex:
                        type: integer
                      pageSize:
                        type: integer
                  metadata:
                    $ref: '#/components/schemas/ResponseMetadata'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Follows
      summary: 追蹤商品
      description: 將商品加入追蹤清單（需要登入，不可追蹤自己的商品）
      operationId: followAuction
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FollowRequest'
      responses:
        '201':
          description: 成功追蹤商品
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/FollowItem'
                  metadata:
                    $ref: '#/components/schemas/ResponseMetadata'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/follows/{auctionId}:
    delete:
      tags:
        - Follows
      summary: 取消追蹤商品
      description: 將商品從追蹤清單中移除（需要登入）
      operationId: unfollowAuction
      security:
        - bearerAuth: []
      parameters:
        - name: auctionId
          in: path
          required: true
          description: 商品 ID
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: 成功取消追蹤
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /health:
    get:
      tags:
        - Health
      summary: 健康檢查
      description: 檢查服務是否正常運作
      operationId: healthCheck
      responses:
        '200':
          description: 服務正常
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "Healthy"
                  timestamp:
                    type: string
                    format: date-time

  /ready:
    get:
      tags:
        - Health
      summary: 就緒檢查
      description: 檢查服務是否準備好接收流量（包含資料庫連線檢查）
      operationId: readinessCheck
      responses:
        '200':
          description: 服務已就緒
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "Ready"
                  database:
                    type: string
                    example: "Connected"
                  timestamp:
                    type: string
                    format: date-time

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Access Token from Member Service

  schemas:
    AuctionListItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: 商品 ID
        title:
          type: string
          description: 商品名稱
        startingPrice:
          type: number
          format: decimal
          description: 起標價
        categoryId:
          type: integer
          format: int64
          description: 分類 ID
        categoryName:
          type: string
          description: 分類名稱
        endTime:
          type: string
          format: date-time
          description: 結束時間（UTC）
        status:
          type: string
          enum: [Pending, Active, Ended]
          description: 商品狀態
        imageUrl:
          type: string
          description: 主圖 URL
        creatorId:
          type: integer
          format: int64
          description: 創建者使用者 ID
      required:
        - id
        - title
        - startingPrice
        - categoryId
        - categoryName
        - endTime
        - status
        - creatorId

    AuctionDetail:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        startingPrice:
          type: number
          format: decimal
        categoryId:
          type: integer
          format: int64
        categoryName:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        status:
          type: string
          enum: [Pending, Active, Ended]
        imageUrls:
          type: array
          items:
            type: string
        creatorId:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - description
        - startingPrice
        - categoryId
        - categoryName
        - startTime
        - endTime
        - status
        - imageUrls
        - creatorId
        - createdAt
        - updatedAt

    CreateAuctionRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 200
          description: 商品名稱
        description:
          type: string
          minLength: 10
          maxLength: 2000
          description: 商品描述
        startingPrice:
          type: number
          format: decimal
          minimum: 0.01
          maximum: 10000000
          description: 起標價
        categoryId:
          type: integer
          format: int64
          description: 分類 ID
        endTime:
          type: string
          format: date-time
          description: 結束時間（必須至少在 1 小時之後）
      required:
        - title
        - description
        - startingPrice
        - categoryId
        - endTime

    UpdateAuctionRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 200
        description:
          type: string
          minLength: 10
          maxLength: 2000
        startingPrice:
          type: number
          format: decimal
          minimum: 0.01
          maximum: 10000000
        categoryId:
          type: integer
          format: int64
        endTime:
          type: string
          format: date-time
        rowVersion:
          type: string
          format: byte
          description: 並發控制版本號（Base64 編碼）

    CurrentBid:
      type: object
      properties:
        auctionId:
          type: integer
          format: int64
        currentBid:
          type: object
          nullable: true
          properties:
            amount:
              type: number
              format: decimal
              description: 目前最高出價金額
            bidderId:
              type: integer
              format: int64
              description: 出價者使用者 ID
            bidTime:
              type: string
              format: date-time
              description: 出價時間（UTC）
            dataSource:
              type: string
              enum: [live, cache]
              description: 資料來源（live=即時資料, cache=快取資料）
      required:
        - auctionId

    Category:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        displayOrder:
          type: integer
        isEnabled:
          type: boolean
      required:
        - id
        - name
        - displayOrder
        - isEnabled

    FollowItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: 追蹤記錄 ID
        auctionId:
          type: integer
          format: int64
        auction:
          $ref: '#/components/schemas/AuctionListItem'
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - auctionId
        - auction
        - createdAt

    FollowRequest:
      type: object
      properties:
        auctionId:
          type: integer
          format: int64
          description: 要追蹤的商品 ID
      required:
        - auctionId

    ResponseMetadata:
      type: object
      properties:
        statusCode:
          type: string
          description: 回應代碼（例如 SUCCESS, AUCTION_NOT_FOUND）
        statusName:
          type: string
          description: 回應名稱
        message:
          type: string
          description: 訊息（依語系從 ResponseCodes 資料表取得）
      required:
        - statusCode
        - statusName
        - message

    ErrorDetail:
      type: object
      properties:
        field:
          type: string
          description: 錯誤欄位名稱
        message:
          type: string
          description: 錯誤訊息

  responses:
    BadRequest:
      description: 請求參數錯誤
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  $ref: '#/components/schemas/ErrorDetail'
              metadata:
                $ref: '#/components/schemas/ResponseMetadata'

    Unauthorized:
      description: 未授權（需要登入）
      content:
        application/json:
          schema:
            type: object
            properties:
              metadata:
                $ref: '#/components/schemas/ResponseMetadata'

    Forbidden:
      description: 禁止存取（無權限）
      content:
        application/json:
          schema:
            type: object
            properties:
              metadata:
                $ref: '#/components/schemas/ResponseMetadata'

    NotFound:
      description: 資源不存在
      content:
        application/json:
          schema:
            type: object
            properties:
              metadata:
                $ref: '#/components/schemas/ResponseMetadata'

    Conflict:
      description: 衝突（例如並發編輯）
      content:
        application/json:
          schema:
            type: object
            properties:
              metadata:
                $ref: '#/components/schemas/ResponseMetadata'

    InternalServerError:
      description: 伺服器內部錯誤
      content:
        application/json:
          schema:
            type: object
            properties:
              metadata:
                $ref: '#/components/schemas/ResponseMetadata'
