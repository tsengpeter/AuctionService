# Full-stack compose override — adds the API service to the base DB compose.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.full.yml up -d --build

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auctionservice-api
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-auctionservice};Username=${POSTGRES_USER:-auctionuser};Password=${POSTGRES_PASSWORD:-change_me_in_production}"
      JWT_SECRET: ${JWT_SECRET:-change_me_secret_minimum_32_chars_long}
      JWT_ISSUER: ${JWT_ISSUER:-AuctionService}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-AuctionService}
      JWT_EXPIRY_MINUTES: ${JWT_EXPIRY_MINUTES:-60}
    ports:
      - "8080:8080"
    networks:
      - auctionservice-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
